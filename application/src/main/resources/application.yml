api:
  base-path: ${API_BASE_PATH:/api/v1}

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:orders-platform}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:ordersdb}?sslmode=${POSTGRES_SSLMODE:require}&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
    username: ${POSTGRES_MI_USER:orders-service-identity}
    driver-class-name: org.postgresql.Driver

    azure:
      passwordless-enabled: ${SPRING_DATASOURCE_AZURE_PASSWORDLESS_ENABLED:false}

    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: orders
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: ${spring.application.name:orders-platform}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: orders
    default-schema: orders

  cloud:
    azure:
      credential:
        managed-identity-enabled: ${AZURE_MI_ENABLED:false}
        client-id: ${AZURE_MI_CLIENT_ID:}
      active-directory:
        enabled: ${AZURE_AD_ENABLED:false}
        credential:
          client-id: ${ENTRA_APP_CLIENT_ID:}
          client-secret: ${ENTRA_APP_CLIENT_SECRET:}
        profile:
          tenant-id: ${AZURE_TENANT_ID:}
        app-id-uri: api://${ENTRA_APP_CLIENT_ID:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      client-id: ${ENTRA_APP_CLIENT_ID:}
      use-pkce-with-authorization-code-grant: true

management:
  endpoint:
    health:
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health,info
