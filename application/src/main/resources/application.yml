server:
  port: 8080

spring:

  jpa:
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        default_schema: orders

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoint:
    health:
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health,info