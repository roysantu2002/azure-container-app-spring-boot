name: "Provision Azure Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      action:
        description: "Terraform action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
          - import

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: terraform
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_USE_OIDC: true

jobs:
  terraform:
    name: "Terraform ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug — Verify secrets are set
        run: |
          echo "AZURE_CLIENT_ID is set: ${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "AZURE_TENANT_ID is set: ${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "AZURE_SUBSCRIPTION_ID is set: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"
          echo "CLIENT_ID length: $(echo -n '${{ secrets.AZURE_CLIENT_ID }}' | wc -c)"
          echo "TENANT_ID length: $(echo -n '${{ secrets.AZURE_TENANT_ID }}' | wc -c)"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Import Existing Azure Resources
        if: github.event.inputs.action == 'import'
        run: |
          set -e
          SUBSCRIPTION_ID="${ARM_SUBSCRIPTION_ID}"
          RG="rg-orders-dev"
          VARS="-var-file=environments/${{ github.event.inputs.environment }}.tfvars"

          echo "=== Importing existing resources into Terraform state ==="

          # Resource Group
          terraform import $VARS azurerm_resource_group.orders \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}" 2>&1 || echo "SKIP: resource group (already in state or not found)"

          # User-Assigned Managed Identity
          terraform import $VARS azurerm_user_assigned_identity.orders_service \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/orders-service-identity" 2>&1 || echo "SKIP: managed identity"

          # Container Registry
          terraform import $VARS azurerm_container_registry.orders \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.ContainerRegistry/registries/acrordersdev" 2>&1 || echo "SKIP: container registry"

          # PostgreSQL Flexible Server
          terraform import $VARS azurerm_postgresql_flexible_server.orders \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg-orders-dev" 2>&1 || echo "SKIP: postgres server"

          # PostgreSQL Firewall Rule
          terraform import $VARS azurerm_postgresql_flexible_server_firewall_rule.allow_azure \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg-orders-dev/firewallRules/AllowAzureServices" 2>&1 || echo "SKIP: postgres firewall rule"

          # PostgreSQL Database
          terraform import $VARS azurerm_postgresql_flexible_server_database.ordersdb \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/pg-orders-dev/databases/ordersdb" 2>&1 || echo "SKIP: postgres database"

          # Log Analytics Workspace
          terraform import $VARS azurerm_log_analytics_workspace.orders \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.OperationalInsights/workspaces/log-orders-dev" 2>&1 || echo "SKIP: log analytics"

          # ACA Environment
          terraform import $VARS azurerm_container_app_environment.orders \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.App/managedEnvironments/managedEnvironment-rgordersdev-a29a" 2>&1 || echo "SKIP: aca environment"

          # Container App
          terraform import $VARS azurerm_container_app.orders \
            "/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.App/containerApps/acrordersapp" 2>&1 || echo "SKIP: container app"

          echo "=== Import complete. Run 'plan' next to verify state. ==="

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: |
          terraform plan -var-file=environments/${{ github.event.inputs.environment }}.tfvars -out=tfplan 2>&1 | tee plan-output.txt
          echo "--- Plan exit code: $? ---"

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: |
          terraform apply -auto-approve tfplan 2>&1 | tee apply-output.txt
          echo "--- Apply exit code: $? ---"

      - name: Upload Terraform logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-logs
          path: |
            terraform/plan-output.txt
            terraform/apply-output.txt

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=environments/${{ github.event.inputs.environment }}.tfvars -auto-approve