name: "Deploy to ACA"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Full image tag (e.g. acrordersdev.azurecr.io/orders-service:abc1234). Leave empty to use latest."
        required: false
        default: ""
  workflow_run:
    workflows: ["Build and Push Image"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: orders-service
  RESOURCE_GROUP: rg-orders-dev
  CONTAINER_APP_NAME: acrordersapp

jobs:
  deploy:
    name: "Deploy to Container App"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${TAG}"

      - name: Get Managed Identity Client ID
        id: mi
        run: |
          CLIENT_ID=$(az identity show \
            --name orders-service-identity \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "clientId" -o tsv)
          echo "client_id=${CLIENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Managed Identity Client ID: ${CLIENT_ID}"

      - name: Set environment variables
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "POSTGRES_HOST=pg-orders-dev.postgres.database.azure.com" \
              "POSTGRES_DB=ordersdb" \
              "POSTGRES_MI_USER=orders-service-identity" \
              "AZURE_CLIENT_ID=${{ steps.mi.outputs.client_id }}" \
              "SPRING_DATASOURCE_AZURE_PASSWORDLESS_ENABLED=true" \
              "AZURE_MI_ENABLED=true"

      - name: Wait for provisioning to complete
        run: |
          echo "Waiting for container app provisioning to complete..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "properties.provisioningState" -o tsv)
            echo "Attempt ${i}: provisioningState=${STATE}"
            if [ "$STATE" = "Succeeded" ]; then
              echo "Provisioning complete."
              break
            fi
            sleep 10
          done

      - name: Deploy image
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ steps.image.outputs.tag }}"

      - name: Verify deployment
        run: |
          az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "{name:name, image:properties.template.containers[0].image, fqdn:properties.configuration.ingress.fqdn, provisioningState:properties.provisioningState}" \
            -o table

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App URL: https://${FQDN}"
          echo "Health:  https://${FQDN}/actuator/health"
          echo "Orders:  https://${FQDN}/orders"